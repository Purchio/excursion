name: Deploy built app to docs/

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: BASE_PATH=/excursion/ npm run build

      - name: Copy build to docs/
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r dist/* docs/

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          clean: true
